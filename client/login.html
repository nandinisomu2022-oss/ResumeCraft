<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ResumeCraft</title>
  <meta name="description" content="Sign in to ResumeCraft to create and manage your portfolio."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body class="auth-body">

  <!-- Background Shapes -->
  <div class="auth-bg">
    <div class="auth-shape s1"></div>
    <div class="auth-shape s2"></div>
    <div class="auth-shape s3"></div>
    <div class="auth-shape s4"></div>
  </div>

  <div class="container auth-container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="auth-card-wrapper animate-fade-in">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2">Welcome Back</h2>
            <p class="text-muted mb-0">Sign in to manage your portfolios and generate resumes faster.</p>
          </div>
      <!-- Tabs: Login / Register -->
      <ul class="nav nav-pills auth-tabs mb-4" id="authTabs">
        <li class="nav-item flex-fill">
          <button class="nav-link active w-100" id="loginTab" onclick="switchTab('login')">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </li>
        <li class="nav-item flex-fill">
          <button class="nav-link w-100" id="registerTab" onclick="switchTab('register')">
            <i class="bi bi-person-plus me-2"></i>Sign Up
          </button>
        </li>
      </ul>

      <!-- Alert Area -->
      <div id="authAlert" class="d-none mb-3"></div>

      <!-- LOGIN FORM -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label fw-500">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="btn btn-outline-secondary toggle-pass" onclick="togglePassword('loginPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100" id="loginBtn">
          <span class="btn-text">Login to ResumeCraft</span>
          <span class="btn-loading d-none"><span class="spinner-border spinner-border-sm me-2"></span>Logging in...</span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="d-none" onsubmit="handleRegister(event)">
        <div class="mb-3">
          <label class="form-label fw-500">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters" required autocomplete="new-password"/>
            <button type="button" class="btn btn-outline-secondary toggle-pass" onclick="togglePassword('regPassword', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div id="passStrength" class="mt-2"></div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="regConfirm" placeholder="Repeat password" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="regName" placeholder="John Doe" required autocomplete="name"/>
          </div>
        </div>
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="agreeTerms" required/>
          <label class="form-check-label small" for="agreeTerms">
            I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100" id="registerBtn">
          <span class="btn-text">Create Free Account</span>
          <span class="btn-loading d-none"><span class="spinner-border spinner-border-sm me-2"></span>Creating account...</span>
        </button>
      </form>

      <!-- Trust Badges -->
      <div class="trust-badges mt-4 text-center">
        <small class="text-muted">Secure login • Private access • Instant portfolio creation</small>
      </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check if already logged in
    if (localStorage.getItem('rc_token')) {
      window.location.href = 'dashboard.html';
    }

    // Check URL params for errors
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'oauth_failed') {
      showAlert('Google login failed. Please try again.', 'danger');
    }

    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab !== 'login');
      document.getElementById('authAlert').classList.add('d-none');
    }

    function showAlert(msg, type = 'danger') {
      const alert = document.getElementById('authAlert');
      alert.className = `alert alert-${type} d-block`;
      alert.innerHTML = `<i class="bi bi-${type === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${msg}`;
    }

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { input.type = 'password'; icon.className = 'bi bi-eye'; }
    }

    // Password strength indicator
    document.getElementById('regPassword').addEventListener('input', function() {
      const val = this.value;
      const strength = document.getElementById('passStrength');
      if (val.length < 6) { strength.innerHTML = '<div class="progress"><div class="progress-bar bg-danger" style="width:25%"></div></div><small class="text-danger">Weak</small>'; }
      else if (val.length < 10) { strength.innerHTML = '<div class="progress"><div class="progress-bar bg-warning" style="width:60%"></div></div><small class="text-warning">Fair</small>'; }
      else { strength.innerHTML = '<div class="progress"><div class="progress-bar bg-success" style="width:100%"></div></div><small class="text-success">Strong</small>'; }
    });

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.querySelector('.btn-text').classList.add('d-none');
      btn.querySelector('.btn-loading').classList.remove('d-none');
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('rc_token', data.token);
        localStorage.setItem('rc_user', JSON.stringify(data.user));
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        showAlert(err.message || 'Login failed. Check credentials.');
      } finally {
        btn.querySelector('.btn-text').classList.remove('d-none');
        btn.querySelector('.btn-loading').classList.add('d-none');
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const pass = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      if (pass !== confirm) return showAlert('Passwords do not match');

      const btn = document.getElementById('registerBtn');
      btn.querySelector('.btn-text').classList.add('d-none');
      btn.querySelector('.btn-loading').classList.remove('d-none');
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: pass,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('rc_token', data.token);
        localStorage.setItem('rc_user', JSON.stringify(data.user));
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        showAlert(err.message || 'Registration failed');
      } finally {
        btn.querySelector('.btn-text').classList.remove('d-none');
        btn.querySelector('.btn-loading').classList.add('d-none');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
